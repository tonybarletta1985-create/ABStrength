<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AB Strength — Gold Coast 2026</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="AB Strength">
<meta name="theme-color" content="#e6f1fb">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-primary: #ffffff; --bg-secondary: #f5f5f3; --bg-info: #e6f1fb;
  --bg-green: #eaf3de; --bg-purple: #eeedfe; --bg-amber: #faeeda; --bg-coral: #faece7;
  --text-primary: #1a1a18; --text-secondary: #6b6b67;
  --text-info: #0c447c; --text-green: #27500A; --text-purple: #3c3489;
  --text-amber: #633806; --text-coral: #712b13;
  --border-light: rgba(0,0,0,0.12); --border-medium: rgba(0,0,0,0.22);
  --radius-md: 8px; --radius-lg: 12px;
  --font: system-ui,-apple-system,sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg-primary: #1e1e1c; --bg-secondary: #2a2a28; --bg-info: #0c2a45;
    --bg-green: #173404; --bg-purple: #26215c; --bg-amber: #412402; --bg-coral: #4a1b0c;
    --text-primary: #f0ede8; --text-secondary: #9a9994;
    --text-info: #85b7eb; --text-green: #c0dd97; --text-purple: #afa9ec;
    --text-amber: #fac775; --text-coral: #f0997b;
    --border-light: rgba(255,255,255,0.1); --border-medium: rgba(255,255,255,0.2);
  }
}

body { font-family: var(--font); background: var(--bg-secondary); color: var(--text-primary); min-height: 100vh; padding: 1.5rem 1rem 4rem; }
.container { max-width: 960px; margin: 0 auto; }
h1.sr-only { position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap; }

/* ── RACE BAR ── */
.race-bar { display:flex; align-items:center; justify-content:space-between; padding:14px 20px; background:var(--bg-info); border-radius:var(--radius-lg); margin-bottom:1.5rem; flex-wrap:wrap; gap:12px; }
.race-bar .big { font-size:24px; font-weight:500; color:var(--text-info); }
.race-bar .sub { font-size:12px; color:var(--text-info); opacity:0.75; margin-top:2px; }

/* ── TABS ── */
.main-tabs { display:flex; gap:8px; margin-bottom:1.25rem; border-bottom:0.5px solid var(--border-light); padding-bottom:8px; flex-wrap:wrap; }
.main-tab { padding:6px 14px; font-size:13px; cursor:pointer; border-radius:var(--radius-md); color:var(--text-secondary); background:none; border:none; font-family:var(--font); transition:background 0.15s; }
.main-tab.active { background:var(--bg-primary); color:var(--text-primary); font-weight:500; box-shadow:0 0 0 0.5px var(--border-medium); }

/* ── WEEK TABS ── */
.week-tabs-wrap { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:1.25rem; }
.week-tab { padding:5px 11px; font-size:12px; cursor:pointer; border-radius:20px; border:0.5px solid var(--border-light); background:var(--bg-primary); color:var(--text-secondary); font-family:var(--font); transition:all 0.15s; }
.week-tab:hover { border-color:var(--border-medium); }
.week-tab.active { background:var(--text-primary); color:var(--bg-primary); border-color:var(--text-primary); font-weight:500; }
.week-tab.done { border-color:#639922; color:var(--text-green); background:var(--bg-green); }
.week-tab.done.active { background:var(--text-green); color:#fff; }

/* ── PILLS ── */
.pill { display:inline-block; font-size:11px; padding:3px 9px; border-radius:20px; font-weight:500; white-space:nowrap; }
.p-gym    { background:var(--bg-green);  color:var(--text-green); }
.p-home   { background:var(--bg-purple); color:var(--text-purple); }
.p-run    { background:var(--bg-info);   color:var(--text-info); }
.p-rest   { background:var(--bg-secondary); color:var(--text-secondary); }
.p-arms   { background:var(--bg-purple); color:var(--text-purple); }
.p-food   { background:var(--bg-green);  color:var(--text-green); }
.load-full   { background:var(--bg-green);  color:var(--text-green); }
.load-mod    { background:var(--bg-amber);  color:var(--text-amber); }
.load-light  { background:var(--bg-coral);  color:var(--text-coral); }
.load-taper  { background:var(--bg-purple); color:var(--text-purple); }

/* ── WEEK OVERVIEW ── */
.week-overview { background:var(--bg-primary); border:0.5px solid var(--border-light); border-radius:var(--radius-lg); padding:1.25rem; margin-bottom:1.25rem; }
.week-ov-header { display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
.week-ov-title { font-size:16px; font-weight:500; }
.week-ov-meta { font-size:12px; color:var(--text-secondary); margin-top:3px; }

/* ── DAY GRID ── */
.day-grid { display:grid; grid-template-columns:repeat(7,minmax(0,1fr)); gap:6px; margin-bottom:1.25rem; }
.day-cell { background:var(--bg-primary); border:0.5px solid var(--border-light); border-radius:var(--radius-lg); padding:10px 8px; min-height:90px; cursor:pointer; transition:border-color 0.15s; }
.day-cell:hover { border-color:var(--border-medium); }
.day-cell.sel { border:2px solid #378ADD; }
.day-cell.today-c { border:1.5px solid #378ADD; }
.day-lbl { font-size:10px; font-weight:500; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:5px; }
.day-pills { display:flex; flex-direction:column; gap:3px; }
.day-note-sm { font-size:10px; color:var(--text-secondary); margin-top:4px; line-height:1.35; }
.day-done-sm { font-size:10px; color:var(--text-green); margin-top:3px; }

/* ── DAY DETAIL ── */
.day-detail { background:var(--bg-primary); border:2px solid #378ADD; border-radius:var(--radius-lg); padding:1.25rem; margin-bottom:1.25rem; position:relative; }
.det-close { position:absolute; top:12px; right:14px; background:none; border:none; font-size:20px; color:var(--text-secondary); cursor:pointer; font-family:var(--font); line-height:1; }
.det-title { font-size:16px; font-weight:500; margin-bottom:4px; }
.det-sub { font-size:12px; color:var(--text-secondary); margin-bottom:1rem; }
.det-combo { background:var(--bg-amber); border-radius:var(--radius-md); padding:8px 12px; font-size:12px; color:var(--text-amber); line-height:1.5; margin-bottom:1rem; }

/* ── ACCORDION ── */
.acc { border:0.5px solid var(--border-light); border-radius:var(--radius-lg); margin-bottom:10px; overflow:hidden; }
.acc-hd { display:flex; align-items:center; justify-content:space-between; padding:12px 14px; cursor:pointer; background:var(--bg-primary); user-select:none; gap:10px; }
.acc-hd:hover { background:var(--bg-secondary); }
.acc-hd-left { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.acc-title { font-size:14px; font-weight:500; }
.acc-chevron { font-size:11px; color:var(--text-secondary); transition:transform 0.2s; flex-shrink:0; }
.acc-chevron.open { transform:rotate(180deg); }
.acc-body { display:none; padding:0 14px 14px; background:var(--bg-primary); border-top:0.5px solid var(--border-light); }
.acc-body.open { display:block; }

/* ── SESSION TABLE ── */
.session-table { width:100%; border-collapse:collapse; font-size:13px; }
.session-table th { text-align:left; padding:6px 10px; color:var(--text-secondary); font-weight:500; font-size:11px; border-bottom:0.5px solid var(--border-light); text-transform:uppercase; letter-spacing:0.05em; }
.session-table td { padding:10px 10px; border-bottom:0.5px solid var(--border-light); vertical-align:top; line-height:1.5; }
.session-table tr:last-child td { border-bottom:none; }
.session-table tr:hover td { background:var(--bg-secondary); }
.ex-name { font-weight:500; }
.ex-done { font-weight:500; text-decoration:line-through; opacity:0.5; }
.ex-tip { font-size:11px; color:var(--text-secondary); margin-top:3px; line-height:1.4; }
.ex-prog { font-size:11px; color:var(--text-info); margin-top:2px; }
.ex-machine { font-size:11px; color:var(--text-info); margin-top:2px; }
.ex-check { width:16px; height:16px; cursor:pointer; accent-color:#378ADD; }
.weight-inp { width:66px; padding:3px 6px; border:0.5px solid var(--border-medium); border-radius:5px; background:var(--bg-secondary); color:var(--text-primary); font-size:12px; font-family:var(--font); }

/* ── NUTRITION ── */
.meal-row { display:flex; gap:10px; padding:10px 0; border-bottom:0.5px solid var(--border-light); align-items:flex-start; }
.meal-row:last-child { border-bottom:none; padding-bottom:0; }
.meal-time { font-size:11px; font-weight:500; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.05em; min-width:82px; padding-top:1px; line-height:1.4; flex-shrink:0; }
.meal-content { flex:1; font-size:13px; line-height:1.55; }
.meal-prot { font-size:11px; font-weight:500; color:var(--text-green); margin-top:3px; }
.meal-tip  { font-size:11px; color:var(--text-amber); margin-top:3px; line-height:1.4; }
.meal-enjoy{ font-size:11px; color:var(--text-purple); margin-top:3px; }
.prot-target { font-size:11px; font-weight:500; color:var(--text-green); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:10px; padding-top:10px; }

/* ── NOTES / INFO BOXES ── */
.info-box { background:var(--bg-info); border-radius:var(--radius-md); padding:10px 14px; font-size:12px; color:var(--text-info); line-height:1.6; margin-bottom:1rem; }
.warn-box { background:var(--bg-amber); border-radius:var(--radius-md); padding:10px 14px; font-size:12px; color:var(--text-amber); line-height:1.6; margin-bottom:1rem; }

/* ── LOG FORM ── */
.log-form { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:10px; }
.fg { display:flex; flex-direction:column; gap:4px; }
.fg label { font-size:12px; color:var(--text-secondary); }
.fg input, .fg select { padding:7px 10px; border:0.5px solid var(--border-medium); border-radius:var(--radius-md); background:var(--bg-secondary); color:var(--text-primary); font-size:13px; font-family:var(--font); }
.fg input:focus, .fg select:focus { outline:none; border-color:#378ADD; }

/* ── BUTTONS ── */
.btn-save { margin-top:10px; padding:8px 22px; background:var(--text-info); color:#fff; border:none; border-radius:var(--radius-md); font-size:13px; font-weight:500; cursor:pointer; font-family:var(--font); }
.btn-save:hover { opacity:0.88; }
.btn-remove { font-size:12px; padding:4px 10px; border:0.5px solid var(--border-medium); border-radius:var(--radius-md); background:none; color:var(--text-secondary); cursor:pointer; font-family:var(--font); }
.logged-badge { font-size:11px; padding:3px 9px; border-radius:20px; background:var(--bg-green); color:var(--text-green); font-weight:500; }

/* ── PROGRESS ── */
.metrics-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:1.5rem; }
.metric-card { background:var(--bg-secondary); border-radius:var(--radius-md); padding:14px; }
.metric-label { font-size:11px; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:5px; }
.metric-val { font-size:22px; font-weight:500; }
.prog-row { display:flex; align-items:center; gap:10px; }
.prog-bar-wrap { flex:1; background:var(--bg-secondary); border-radius:4px; height:6px; }
.prog-bar { height:6px; border-radius:4px; background:#378ADD; transition:width 0.5s; }
.prog-label { font-size:12px; color:var(--text-secondary); min-width:50px; text-align:right; }

/* ── NAV ── */
.nav-btns { display:flex; gap:8px; margin-top:10px; }
.nav-btn { padding:6px 14px; border:0.5px solid var(--border-medium); border-radius:var(--radius-md); background:var(--bg-primary); color:var(--text-secondary); font-size:13px; cursor:pointer; font-family:var(--font); }

@media (max-width:640px) {
  .day-grid { grid-template-columns:repeat(4,1fr); }
  .metrics-grid { grid-template-columns:repeat(2,1fr); }
  .log-form { grid-template-columns:1fr 1fr; }
  .meal-time { min-width:64px; }
}
@media (max-width:420px) {
  .day-grid { grid-template-columns:repeat(2,1fr); }
  .log-form { grid-template-columns:1fr; }
}
</style>
</head>
<body>
<div class="container">
<h1 class="sr-only">AB Strength Plan — 9 weeks Gold Coast 2026</h1>

<div class="race-bar">
  <div>
    <div class="big">AB Strength Plan</div>
    <div class="sub">77kg · definition &amp; arm size · Gold Coast build</div>
  </div>
  <div style="text-align:right">
    <div class="big" id="weeks-remaining">—</div>
    <div class="sub">weeks to race</div>
  </div>
</div>

<div class="main-tabs">
  <button class="main-tab active" onclick="switchTab('plan',this)">Plan</button>
  <button class="main-tab" onclick="switchTab('log',this)">Log session</button>
  <button class="main-tab" onclick="switchTab('progress',this)">Progress</button>
  <button class="main-tab" onclick="switchTab('guide',this)">Guide</button>
</div>

<div id="tab-plan">
  <div class="week-tabs-wrap" id="plan-week-tabs"></div>
  <div id="plan-content"></div>
</div>

<div id="tab-log" style="display:none">
  <div class="week-tabs-wrap" id="log-week-tabs"></div>
  <div id="log-content"></div>
</div>

<div id="tab-progress" style="display:none">
  <div class="metrics-grid">
    <div class="metric-card"><div class="metric-label">Sessions logged</div><div class="metric-val" id="m-total">0</div></div>
    <div class="metric-card"><div class="metric-label">This week</div><div class="metric-val" id="m-week">—</div></div>
    <div class="metric-card"><div class="metric-label">Weeks complete</div><div class="metric-val" id="m-wkc">0</div></div>
    <div class="metric-card"><div class="metric-label">Current week</div><div class="metric-val" id="m-cur">W4</div></div>
  </div>
  <div id="progress-content"></div>
</div>

<div id="tab-guide" style="display:none">
  <div id="guide-content"></div>
</div>

</div><!-- /container -->

<script>
/* ═══════════════════════════════════
   PLAN DATA
═══════════════════════════════════ */
const RUN_WEEKS = [
  {w:4,  label:"Week 4",  dates:"May 5–10",     km:12, load:'recovery', focus:"Post-Sydney recovery. One gym session Tuesday (combined legs + upper). Runs Wednesday and Friday only."},
  {w:5,  label:"Week 5",  dates:"May 12–17",    km:30, load:'base',     focus:"Running volume returns. Full machine legs Tuesday (easy run same evening). Home push Wednesday, home pull Thursday, upper body gym Friday."},
  {w:6,  label:"Week 6",  dates:"May 19–24",    km:28, load:'base',     focus:"Norwegian quality week. Full machine legs Tuesday, upper body gym Friday. Home sessions Wednesday and Thursday."},
  {w:7,  label:"Week 7",  dates:"May 26–31",    km:32, load:'build',    focus:"Threshold running begins. Moderate machine legs — protect running quality. All upper and home sessions continue."},
  {w:8,  label:"Week 8",  dates:"Jun 2–7",      km:36, load:'peak',     focus:"Peak running week (36km). Light machine legs only. Keep fresh. Upper and home sessions maintained."},
  {w:9,  label:"Week 9",  dates:"Jun 9–14",     km:31, load:'build',    focus:"Race simulation week. Moderate legs, maintain all upper body and home sessions."},
  {w:10, label:"Week 10", dates:"Jun 16–21",    km:28, load:'taper',    focus:"Taper begins. Legs drop to maintenance only. Full upper body Friday. Home sessions continue."},
  {w:11, label:"Week 11", dates:"Jun 23–28",    km:22, load:'taper',    focus:"Deep taper. No leg training at all. Upper body gym Friday only. Home sessions continue lightly."},
  {w:12, label:"Week 12", dates:"Jun 30–Jul 5", km:12, load:'race',     focus:"Race week. No gym. Rest, sleep, trust the training."},
];

// Run days per week (short)
const RD = {
  4:['Wed','Fri'], 5:['Mon','Wed','Sat'], 6:['Mon','Wed','Sat'],
  7:['Mon','Wed','Sat'], 8:['Mon','Thu','Sat'], 9:['Mon','Wed','Sat'],
  10:['Mon','Thu','Sat'], 11:['Mon','Wed','Sat'], 12:['Mon','Wed','Sat']
};

const SHORT = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const FULL  = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const D2S   = Object.fromEntries(FULL.map((f,i) => [f, SHORT[i]]));

/* ── EXERCISE BUILDERS ── */
function buildLegs(load, wn) {
  if (load === 'race') return null;
  if (load === 'taper' && wn === 11) return null;
  const full = [
    {name:"Leg press",            sets:"4 × 12", tgt:"Quads · glutes",       mch:"Leg press machine — feet shoulder-width, mid plate",       tip:"2s controlled descent. Drive through full foot.",         prog:"Add 5–10kg/week while form holds"},
    {name:"Leg curl",             sets:"3 × 12", tgt:"Hamstrings",            mch:"Leg curl machine — full range",                            tip:"Safe hamstring isolation. No spinal loading.",            prog:"Add weight when 12 reps easy"},
    {name:"Leg extension",        sets:"3 × 12", tgt:"Quads · VMO",           mch:"Leg extension machine",                                   tip:"Full extension, controlled return. Protects knees for running.",prog:"Add weight weekly"},
    {name:"Seated calf raise",    sets:"4 × 15", tgt:"Calves · Achilles",     mch:"Seated calf raise machine",                               tip:"Full stretch at bottom, full contraction at top. Non-negotiable for runners.", prog:"Add plate when 15 feels easy"},
    {name:"Hip abductor machine", sets:"3 × 15", tgt:"Glutes · hip stability",mch:"Hip abductor machine — pushing outward setting",          tip:"Prevents hip drop in running. Often neglected.",          prog:"Increase when 15 feels controlled"},
    {name:"Ab crunch machine",    sets:"3 × 15", tgt:"Core",                  mch:"Ab crunch / abdominal machine",                           tip:"Sciatica-safe core work. Machine controls range.",        prog:"Add weight when 15 reps easy"},
  ];
  const mod = [
    {name:"Leg press",            sets:"3 × 12", tgt:"Quads · glutes",       mch:"Leg press machine — 70% usual load",   tip:"Lighter this week — running quality is the priority.", prog:"Hold weight from last week"},
    {name:"Leg curl",             sets:"3 × 12", tgt:"Hamstrings",            mch:"Leg curl machine",                     tip:"Keep hamstrings ticking over.",                        prog:"Maintain"},
    {name:"Leg extension",        sets:"2 × 12", tgt:"Quads",                 mch:"Leg extension machine",                tip:"Moderate load only.",                                  prog:"Maintain"},
    {name:"Seated calf raise",    sets:"3 × 15", tgt:"Calves · Achilles",     mch:"Calf raise machine",                   tip:"Always keep calf work in — Achilles health.",          prog:"Maintain"},
    {name:"Hip abductor machine", sets:"2 × 15", tgt:"Hip stability",         mch:"Hip abductor machine",                 tip:"Light maintenance.",                                   prog:"Maintain"},
  ];
  const lite = [
    {name:"Leg press (light)",    sets:"2 × 12", tgt:"Quads · maintenance",   mch:"Leg press machine — 60% load",         tip:"Movement maintenance only. Must be fresh for peak run week.", prog:"—"},
    {name:"Leg curl (light)",     sets:"2 × 12", tgt:"Hamstrings",            mch:"Leg curl machine",                     tip:"Light — keep the pattern.",                            prog:"—"},
    {name:"Seated calf raise",    sets:"3 × 15", tgt:"Calves",                mch:"Calf raise machine",                   tip:"Always do this — runners need resilient Achilles.",     prog:"—"},
  ];
  const maint = [
    {name:"Leg press (very light)",sets:"2 × 10",tgt:"Movement maintenance",  mch:"Leg press — 50% load",                 tip:"Taper: patterns only, zero fatigue.",                  prog:"—"},
    {name:"Seated calf raise",     sets:"2 × 12",tgt:"Calves",                mch:"Calf raise machine",                   tip:"Keep Achilles happy through taper.",                   prog:"—"},
  ];
  const noteMap = {
    recovery:"Recovery week from Sydney HM — legs are relatively fresh so full session is fine. Focus on technique and moderate loads.",
    base:    "Base phase. Full machine session — keep leg press at 70–75% max. Legs need to recover for Saturday's long run.",
    build:   "Running intensity building. Reduced leg volume this week — no new PRs. Protect your quality runs.",
    peak:    "Peak running week (36km). Gym legs deprioritised — your running IS your leg workout. Keep very light.",
    taper:   "Taper phase. Maintenance movement only. Protect your legs completely.",
  };
  const exMap = {recovery:full, base:full, build:mod, peak:lite, taper:maint};
  const lblMap = {recovery:"Legs — full machine session", base:"Legs — full machine session", build:"Legs — moderate", peak:"Legs — light", taper:"Legs — maintenance"};
  return {label:lblMap[load], exercises:exMap[load], note:noteMap[load]};
}

function buildUpper(wn) {
  const base = [
    {name:"Cable bicep curl",               sets:"4 × 10", tgt:"Biceps ★",            mch:"Cable machine — EZ bar, low pulley",              tip:"3s eccentric every rep. No swinging.",           prog:"Add 2.5kg when all 4 sets hit 10"},
    {name:"Tricep pushdown (cable)",         sets:"4 × 12", tgt:"Triceps ★",           mch:"Cable machine — rope or V-bar, high pulley",      tip:"Full lockout at bottom. Triceps = 2/3 arm size.", prog:"Add weight weekly"},
    {name:"Overhead cable tricep extension", sets:"3 × 10", tgt:"Triceps long head ★", mch:"Cable — single rope, high pulley, face away",     tip:"Biggest visual impact for arm size. Full stretch.", prog:"Increase load gradually"},
    {name:"Incline dumbbell press",          sets:"3 × 10", tgt:"Upper chest",         mch:"Incline bench 30–45° + dumbbells",                tip:"Upper chest fullness visible from front.",       prog:"Add 2kg/side when 10 reps easy"},
    {name:"Lateral raise",                   sets:"3 × 15", tgt:"Shoulder caps",       mch:"Cable low pulley or light dumbbells",             tip:"Lead with elbow. Creates shoulder width.",       prog:"Light weight, perfect form"},
    {name:"Hammer curl",                     sets:"3 × 12", tgt:"Brachialis ★",        mch:"Dumbbells — neutral grip, thumb up",              tip:"Pushes bicep peak higher.",                      prog:"Increase 2kg when easy"},
  ];
  const adv = [...base,
    {name:"Cable face pull", sets:"3 × 15", tgt:"Rear delts · posture", mch:"Cable machine — rope at eye height", tip:"External rotation at end. Rear delt definition + posture fix.", prog:"Light — focus on squeeze"},
  ];
  return {label:"Upper body — gym (arms priority)", exercises: wn<=6 ? base : adv};
}

function buildHomePush(load) {
  if (load === 'race') return null;
  const s = load === 'peak' ? '2' : '3';
  return {label:"Home — push session", exercises:[
    {name:"Weighted / archer push-up",  sets:`${s} × 12–15`, tgt:"Chest · triceps",   mch:"Home — plate on back or archer variation", tip:"Progress to archer once standard is easy.",  prog:"Progress to weighted dips"},
    {name:"Dips",                       sets:`${s} × 10–12`, tgt:"Triceps · chest ★", mch:"Dip station or sturdy chairs",             tip:"Upright = triceps. Lean = chest. Mix both.", prog:"Add dumbbell between legs when easy"},

function buildWeek(rw) {
  if (rw.w === 4) {
    const c = combinedW4();
    return {...rw, sessions:[{id:'combined',day:'Tuesday',type:'gym',label:c.label,data:c,note:c.note}]};
  }
  const l = buildLegs(rw.load, rw.w);
  const u = rw.load === 'race' ? null : buildUpper(rw.w);
  const p = buildHomePush(rw.load);
  const q = buildHomePull(rw.load);
  const sessions = [];
  if (l) sessions.push({id:'legs', day:'Tuesday',   type:'gym',  label:l.label, data:l, note:l.note});
  if (u) sessions.push({id:'upper',day:'Friday',    type:'gym',  label:u.label, data:u, note:null});
  if (p) sessions.push({id:'push', day:'Wednesday', type:'home', label:p.label, data:p, note:null});
  if (q) sessions.push({id:'pull', day:'Thursday',  type:'home', label:q.label, data:q, note:null});
  return {...rw, sessions};
}

function getDayNutrition(wkNum, shortDay) {
  if (wkNum === 4) {
    if (shortDay === 'Tue') return NUTRITION.gymlegs_w4;
    if (shortDay === 'Wed' || shortDay === 'Fri') return NUTRITION.run_w4;
    return NUTRITION.rest;
  }
  if (shortDay === 'Tue') return NUTRITION.gymlegs;
  if (shortDay === 'Wed') return NUTRITION.homepush;
  if (shortDay === 'Thu') return NUTRITION.homepull;
  if (shortDay === 'Fri') return NUTRITION.gymhome_fri;
  if (shortDay === 'Sat') return NUTRITION.run_only;
  if (shortDay === 'Sun') return NUTRITION.rest;
  const rd = RD[wkNum] || [];
  return rd.includes(shortDay) ? NUTRITION.run_only : NUTRITION.rest;
}

function loadBadge(load) {
  const m = {
    recovery:['load-full','Full'], base:['load-full','Full'],
    build:['load-mod','Moderate'], peak:['load-light','Light — peak'],
    taper:['load-taper','Taper'], race:['load-light','Race week']
  };
  const [c,t] = m[load] || ['load-full','Full'];
  return `<span class="pill ${c}">${t}</span>`;
}

function acc(id, title, pills, bodyHtml, open=true) {
  return `<div class="acc">
    <div class="acc-hd" onclick="toggleAcc('${id}')">
      <div class="acc-hd-left"><span class="acc-title">${title}</span>${pills}</div>
      <span class="acc-chevron${open?' open':''}" id="chv-${id}">▼</span>
    </div>
    <div class="acc-body${open?' open':''}" id="acc-${id}">${bodyHtml}</div>
  </div>`;
}

function toggleAcc(id) {
  const b = document.getElementById('acc-'+id);
  const c = document.getElementById('chv-'+id);
  if (!b||!c) return;
  const o = b.classList.contains('open');
  b.classList.toggle('open', !o);
  c.classList.toggle('open', !o);
}

  h += `<div style="padding-top:8px;overflow-x:auto"><table class="session-table">

  s.data.exercises.forEach((ex, ei) => {
    const wv  = weights[`${wk.w}_${s.id}_${ei}`] || '';
    const chk = logged?.exDone?.[ei];
    h += `<tr>
      <td><input type="checkbox" class="ex-check" ${chk?'checked':''} onchange="toggleEx(${wk.w},'${s.id}',${ei},this.checked)"></td>
      <td>
        <div class="${chk?'ex-done':'ex-name'}">${ex.name}</div>
        <div class="ex-tip">${ex.tip}</div>
        ${ex.prog ? `<div class="ex-prog">↑ ${ex.prog}</div>` : ''}
      </td>
      <td style="font-weight:500;white-space:nowrap">${ex.sets}</td>
      <td><div class="ex-machine">${ex.mch}</div></td>
      <td>
        <span class="pill ${ex.tgt.includes('★')?'p-arms':'p-rest'}" style="font-size:10px">${ex.tgt.replace(' ★','')}</span>
        <div style="margin-top:4px">
          <input class="weight-inp" type="text" placeholder="kg" value="${wv}"
            onblur="saveWt(${wk.w},'${s.id}',${ei},this.value)" title="Record weight used">
        </div>
      </td>
    </tr>`;
  });
  h += `</tbody></table></div>
    <div style="margin-top:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <button class="btn-save" onclick="markDone(${wk.w},'${s.id}')">Mark done</button>

  return h;
}

    if (sesArr.length === 0 && isRun) {
      h += acc(`sess_${selDay}`, 'Run session', `<span class="pill p-run" style="font-size:10px">Run</span>`,
        `<div style="padding:10px 0;font-size:13px;color:var(--text-secondary)">See your AB Training Gold Coast running plan for today's session.</div>`, false);
    } else if (sesArr.length === 0) {
      h += acc(`sess_${selDay}`, 'Rest day', `<span class="pill p-rest" style="font-size:10px">Recovery</span>`,
        `<div style="padding:10px 0;font-size:13px;color:var(--text-secondary)">Active recovery only — light walking or stretching. No strength work today.</div>`, false);
    } else {
      sesArr.forEach((s, si) => {
        const done = logs[wk.w+'_'+s.id]?.done;
        const pills = `<span class="pill ${s.type==='gym'?'p-gym':'p-home'}" style="font-size:10px">${s.type==='gym'?'Gym':'Home'}</span>${done?'<span class="logged-badge" style="font-size:10px;margin-left:4px">✓ Done</span>':''}`;
        h += acc(`sess_${selDay}_${si}`, s.label, pills, sessionBody(s, wk), true);
      });
      if (isRun) {
        h += acc(`run_${selDay}`, 'Run session', `<span class="pill p-run" style="font-size:10px">${isTue&&wk.w!==4?'Evening run':'Run'}</span>`,
          `<div style="padding:10px 0;font-size:13px;color:var(--text-secondary)">See your AB Training Gold Coast running plan.${isTue&&wk.w!==4?' Leave at least 4 hours after gym.':''}</div>`, false);
      }
    }

    // Nutrition accordion
    if (nData) {
      h += acc(`nutr_${selDay}`, 'Meal plan',
        `<span class="pill p-food" style="font-size:10px">${nData.label}</span>`,
        nutritionBody(nData), false);
    }

    h += `</div>`; // .day-detail
  }

  h += navBtns();
  el.innerHTML = h;
}

function navBtns() {
  return `<div class="nav-btns">
    ${curPlan>0 ? `<button class="nav-btn" onclick="selPlanWk(${curPlan-1})">← ${PLAN[curPlan-1].label}</button>` : ''}
    ${curPlan<8 ? `<button class="nav-btn" onclick="selPlanWk(${curPlan+1})">${PLAN[curPlan+1].label} →</button>` : ''}
  </div>`;
}

function toggleEx(wk, sid, ei, chk) {
  const k = wk+'_'+sid;
  if (!logs[k]) logs[k] = {date:new Date().toISOString().split('T')[0], exDone:{}};
  if (!logs[k].exDone) logs[k].exDone = {};
  logs[k].exDone[ei] = chk;
  persist();
}
function saveWt(wk, sid, ei, v) { weights[`${wk}_${sid}_${ei}`]=v; persist(); }
function markDone(wk, sid) {
  if (!logs[wk+'_'+sid]) logs[wk+'_'+sid] = {};
  logs[wk+'_'+sid].done = true;
  logs[wk+'_'+sid].date = new Date().toISOString().split('T')[0];
  persist(); renderPlanTabs(); renderPlanContent();
}
function removeSession(wk, sid) { delete logs[wk+'_'+sid]; persist(); renderPlanTabs(); renderPlanContent(); }

/* ═══════════════════════════════════
   LOG TAB
═══════════════════════════════════ */
function renderLogTabs() {
  document.getElementById('log-week-tabs').innerHTML = PLAN.map((wk, i) => {
    const done = wk.sessions.length>0 && wk.sessions.every(s => logs[wk.w+'_'+s.id]?.done);
    return `<button class="week-tab${i===curLog?' active':''}${done?' done':''}" onclick="selLogWk(${i})">${wk.label}</button>`;
  }).join('');
}
function selLogWk(i) { curLog=i; renderLogTabs(); renderLogContent(); }

function renderLogContent() {
  const wk = PLAN[curLog];
  if (wk.load === 'race') {
    document.getElementById('log-content').innerHTML = `<div class="info-box">Race week — no sessions to log. Rest, sleep well.</div>`;
    return;
  }
  let h = `<div style="font-size:15px;font-weight:500;margin-bottom:4px">${wk.label} · ${wk.dates}</div>
    <div style="font-size:12px;color:var(--text-secondary);margin-bottom:1.25rem">${wk.km}km running · ${wk.sessions.length} strength session${wk.sessions.length!==1?'s':''}</div>`;

  wk.sessions.forEach(s => {
    const k  = wk.w+'_'+s.id;
    const lg = logs[k];
    h += `<div style="background:var(--bg-primary);border:0.5px solid var(--border-light);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:${lg?.done?'10px':'1rem'}">
        <div>
          <div style="font-size:14px;font-weight:500;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span class="pill ${s.type==='gym'?'p-gym':'p-home'}">${s.label}</span>
          </div>
          <div style="font-size:12px;color:var(--text-secondary);margin-top:4px">${s.day} · ${s.type==='gym'?'Fitness First':'Home'}</div>
        </div>
        ${lg?.done ? '<span class="logged-badge">✓ Logged</span>' : ''}
      </div>`;

    if (lg?.done) {
      const wes = s.data.exercises.map((ex,ei) => ({n:ex.name.split(' ')[0], v:weights[`${wk.w}_${s.id}_${ei}`]})).filter(x=>x.v);
      h += `<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span style="font-size:12px;color:var(--text-secondary)">Logged ${lg.date}</span>
        ${lg.feel  ? `<span style="font-size:12px;color:var(--text-secondary)">· ${lg.feel}</span>` : ''}
        ${lg.notes ? `<span style="font-size:12px;color:var(--text-secondary)">· ${lg.notes}</span>` : ''}
        <button class="btn-remove" onclick="removeLog('${k}')">Remove</button>
      </div>`;
      if (wes.length) h += `<div style="margin-top:8px;font-size:12px;color:var(--text-secondary)">Weights: ` + wes.map(x=>`<strong>${x.n}: ${x.v}</strong>`).join(' · ') + `</div>`;
    } else {
      h += `<div class="log-form">
        <div class="fg"><label>Session felt</label><select id="feel-${k}">
          <option value="">— select —</option>
          <option>Strong — easy reps</option>
          <option>Good — on target</option>
          <option>Tough but done</option>
          <option>Short — low energy</option>
        </select></div>
        <div class="fg"><label>Duration (mins)</label><input type="number" id="dur-${k}" placeholder="e.g. 38"></div>
        <div class="fg"><label>Notes</label><input type="text" id="notes-${k}" placeholder="PRs, pain, skipped sets…"></div>
      </div>
      <button class="btn-save" onclick="saveLog('${k}')">Save session</button>`;
    }
    h += `</div>`;
  });
  document.getElementById('log-content').innerHTML = h;
}

function saveLog(k) {
  logs[k] = {
    done:  true,
    date:  new Date().toISOString().split('T')[0],
    feel:  document.getElementById('feel-'+k)?.value,
    dur:   document.getElementById('dur-'+k)?.value,
    notes: document.getElementById('notes-'+k)?.value,
  };
  persist(); renderLogTabs(); renderLogContent();
}
function removeLog(k) { delete logs[k]; persist(); renderLogTabs(); renderLogContent(); }

/* ═══════════════════════════════════
   PROGRESS TAB
═══════════════════════════════════ */
function renderProgress() {
  const all  = PLAN.flatMap(wk => wk.sessions.map(s => ({wk,s,lg:logs[wk.w+'_'+s.id]})));
  const done = all.filter(x => x.lg?.done);
  const tw   = PLAN[autoIdx];
  const twd  = tw?.sessions.filter(s => logs[tw.w+'_'+s.id]?.done).length || 0;
  document.getElementById('m-total').textContent = done.length;
  document.getElementById('m-week').textContent  = tw ? `${twd}/${tw.sessions.length}` : '—';
  document.getElementById('m-wkc').textContent   = PLAN.filter(wk => wk.sessions.length>0 && wk.sessions.every(s=>logs[wk.w+'_'+s.id]?.done)).length;
  document.getElementById('m-cur').textContent   = `W${PLAN[autoIdx]?.w||4}`;

  let h = '';
  PLAN.forEach(wk => {
    if (wk.load === 'race') return;
    const tot  = wk.sessions.length;
    const comp = wk.sessions.filter(s => logs[wk.w+'_'+s.id]?.done).length;
    const pct  = tot ? Math.round((comp/tot)*100) : 0;
    h += `<div style="background:var(--bg-primary);border:0.5px solid var(--border-light);border-radius:var(--radius-lg);padding:1rem;margin-bottom:8px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px">
        <div style="font-weight:500;font-size:14px">${wk.label} <span style="font-size:12px;color:var(--text-secondary)">${wk.dates}</span></div>
        <div style="display:flex;align-items:center;gap:8px">${loadBadge(wk.load)}<span style="font-size:12px;color:var(--text-secondary)">${comp}/${tot}</span></div>
      </div>
      <div class="prog-row" style="margin-bottom:8px">
        <div class="prog-bar-wrap"><div class="prog-bar" style="width:${pct}%"></div></div>
        <span class="prog-label">${pct}%</span>
      </div>
      <div style="display:flex;gap:5px;flex-wrap:wrap">
        ${wk.sessions.map(s => {
          const d = logs[wk.w+'_'+s.id]?.done;
          return `<span class="pill ${d?'p-gym':'p-rest'}" style="font-size:10px">${d?'✓ ':' '}${s.day.substring(0,3)}: ${s.type==='gym'?'Gym':'Home'}</span>`;
        }).join('')}
      </div>
    </div>`;
  });
  document.getElementById('progress-content').innerHTML = h;
}

/* ═══════════════════════════════════
   GUIDE TAB
═══════════════════════════════════ */
function renderGuide() {
  document.getElementById('guide-content').innerHTML = `
    <div style="background:var(--bg-primary);border:0.5px solid var(--border-light);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1rem">
      <div style="font-size:15px;font-weight:500;margin-bottom:1rem">Key principles</div>
      <div style="font-size:13px;line-height:1.8">
        <p style="margin-bottom:10px"><strong>Slow eccentrics build size.</strong> 3 seconds on the lowering phase of every curl and tricep movement — every rep, every set. This is the single most important technique change for hypertrophy at 39.</p>
        <p style="margin-bottom:10px"><strong>Triceps = 2/3 of arm size.</strong> The overhead cable extension (long head) is the highest-impact exercise in this plan for visual arm size. Don't skip it.</p>
        <p style="margin-bottom:10px"><strong>Sciatica and lower back.</strong> Every leg exercise is machine-based with no spinal loading. Deadlifts and lunges are removed entirely. If leg press causes any lower back discomfort, reduce the range of motion slightly.</p>
        <p style="margin-bottom:10px"><strong>Tuesday structure.</strong> Gym (legs) at lunch — leave at least 4 hours — easy run in the evening. Legs will feel heavy on the run. That's normal and expected. Keep the run easy, don't chase pace.</p>
        <p style="margin-bottom:10px"><strong>Breakfast timing.</strong> Eat 2.5–3 hours before your gym session. For a 12pm session, that means eating at 9:00–9:30am. A small snack at 11–11:15am is fine if you get hungry.</p>
        <p style="margin-bottom:10px"><strong>Progressive overload.</strong> Add weight only when you complete all sets and reps with clean form. At 77kg and 39, 2–5kg per exercise per month is realistic and sustainable.</p>
        <p><strong>Running takes priority always.</strong> If legs feel compromised before a quality run, skip or reduce the gym leg session. The strength plan serves your running — not the other way around.</p>
      </div>
    </div>
    <div style="background:var(--bg-primary);border:0.5px solid var(--border-light);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1rem">
      <div style="font-size:15px;font-weight:500;margin-bottom:1rem">Fitness First machines to find</div>
      <table class="session-table">
        <thead><tr><th>Machine</th><th>Used for</th><th>Setup tip</th></tr></thead>
        <tbody>
          <tr><td><div class="ex-name">Cable machine (dual stack)</div></td><td>Bicep curls, tricep pushdown, overhead extension, face pull, lateral raise — most versatile machine</td><td>Adjust pulley height per exercise: low for curls, high for pushdown, eye level for face pulls</td></tr>
          <tr><td><div class="ex-name">Leg press</div></td><td>Primary quad + glute work — fully replaces squats and deadlifts</td><td>Feet shoulder-width, mid plate. Back flat throughout.</td></tr>
          <tr><td><div class="ex-name">Leg curl</div></td><td>Hamstring isolation — replaces Romanian deadlift safely</td><td>Full range. Don't rush the return.</td></tr>
          <tr><td><div class="ex-name">Leg extension</div></td><td>Quad isolation, VMO for knee tracking in running</td><td>Full extension, controlled descent.</td></tr>
          <tr><td><div class="ex-name">Seated calf raise</div></td><td>Calf and Achilles resilience — non-negotiable for runners</td><td>Full stretch at bottom, hold contraction at top.</td></tr>
          <tr><td><div class="ex-name">Hip abductor machine</div></td><td>Glute med — prevents hip drop in running gait</td><td>Use pushing-outward setting. Controlled movement.</td></tr>
          <tr><td><div class="ex-name">Ab crunch machine</div></td><td>Core work — sciatica-safe, no spinal flexion</td><td>Controlled tempo. No momentum.</td></tr>
          <tr><td><div class="ex-name">Incline bench + dumbbells</div></td><td>Upper chest fullness visible from front</td><td>Set to 30–45 degrees.</td></tr>
        </tbody>
      </table>
    </div>
    <div style="background:var(--bg-primary);border:0.5px solid var(--border-light);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1rem">
      <div style="font-size:15px;font-weight:500;margin-bottom:1rem">How running volume adjusts gym legs</div>
      <table class="session-table">
        <thead><tr><th>Phase</th><th>Weekly km</th><th>Legs session</th><th>Upper + Home</th></tr></thead>
        <tbody>
          <tr><td><span class="pill load-full">Recovery</span></td><td>~12km</td><td>Tue only — combined legs + upper (40 min)</td><td>No home sessions (Week 4 only)</td></tr>
          <tr><td><span class="pill load-full">Base</span></td><td>24–30km</td><td>Full — 6 exercises, 70–75% load</td><td>Wed push + Thu pull</td></tr>
          <tr><td><span class="pill load-mod">Build</span></td><td>31–33km</td><td>Moderate — 5 exercises, lighter</td><td>Wed push + Thu pull</td></tr>
          <tr><td><span class="pill load-light">Peak</span></td><td>36km</td><td>Light — 3 exercises, 60% load</td><td>Wed push + Thu pull (2 sets)</td></tr>
          <tr><td><span class="pill load-taper">Taper</span></td><td>22–28km</td><td>Maintenance (2 exercises) or none (W11)</td><td>Wed push + Thu pull</td></tr>
          <tr><td><span class="pill p-rest">Race</span></td><td>12km</td><td>None</td><td>None</td></tr>
        </tbody>
      </table>
    </div>
    <div style="background:var(--bg-primary);border:0.5px solid var(--border-light);border-radius:var(--radius-lg);padding:1.25rem">
      <div style="font-size:15px;font-weight:500;margin-bottom:1rem">How to deploy to GitHub Pages</div>
      <div style="font-size:13px;line-height:1.9;color:var(--text-secondary)">
        <p style="margin-bottom:8px">1. Create a free account at <strong style="color:var(--text-primary)">github.com</strong> if you don't have one.</p>
        <p style="margin-bottom:8px">2. Create a new repository — name it anything (e.g. <code style="background:var(--bg-secondary);padding:1px 5px;border-radius:4px">ab-strength</code>). Set it to <strong style="color:var(--text-primary)">Public</strong>.</p>
        <p style="margin-bottom:8px">3. Upload these files: <code style="background:var(--bg-secondary);padding:1px 5px;border-radius:4px">index.html</code>, <code style="background:var(--bg-secondary);padding:1px 5px;border-radius:4px">manifest.json</code>, <code style="background:var(--bg-secondary);padding:1px 5px;border-radius:4px">sw.js</code>, and the <code style="background:var(--bg-secondary);padding:1px 5px;border-radius:4px">.github/workflows/deploy.yml</code> folder + file.</p>
        <p style="margin-bottom:8px">4. Go to Settings → Pages → set Source to <strong style="color:var(--text-primary)">GitHub Actions</strong>.</p>
        <p style="margin-bottom:8px">5. Your app will be live at <strong style="color:var(--text-primary)">https://yourusername.github.io/ab-strength/</strong> within a minute or two.</p>
        <p style="margin-bottom:8px">6. On iPhone: open the URL in Safari → Share button → <strong style="color:var(--text-primary)">Add to Home Screen</strong>. It installs as a full app icon with offline support.</p>
        <p>Any time you update and push the files, GitHub Actions auto-deploys the new version.</p>
      </div>
    </div>`;
}

/* ═══════════════════════════════════
   INIT
═══════════════════════════════════ */
const race     = new Date('2026-07-05');
const wksLeft  = Math.max(0, Math.ceil((race - now) / (7*24*60*60*1000)));
document.getElementById('weeks-remaining').textContent = wksLeft;

renderPlanTabs(); renderPlanContent();
renderLogTabs();  renderLogContent();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
